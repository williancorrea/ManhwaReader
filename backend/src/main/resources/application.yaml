server:
  port: 8080

spring:
  application:
    name: reader
  datasource:
    url: jdbc:mariadb://${DATABASE_CONTAINER_NAME:localhost}:3306/${DATABASE_NAME:reader}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASS:root}
    driver-class-name: org.mariadb.jdbc.Driver
  h2:
    console:
      enabled: true
      path: /console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        enable_lazy_load_no_trans: true # Corrigindo problema de lazy inicialization exception
        format_sql: false
        use_sql_comments: true
        time_zone: UTC # Padroniza o UTC 0 para todas as datas
        jdbc:
          time_zone=UTC # Padroniza o UTC 0 para todas as datas
  jackson:
    time-zone: UTC # Padroniza o UTC 0 para todas as datas

  flyway:
    ignore-migration-patterns: "*:Ignored"
    baseline-on-migrate: true
    validate-on-migrate: true
    enabled: true
    clean-disabled: true
    clean-on-validation-error: false
    validate-migration-naming: true
  
  output:
    ansi:
      enabled: always
  
  cloud:
    openfeign:
      client:

        default:
          connectTimeout: 5000
          readTimeout: 30000
          loggerLevel: basic
        config:
          mediocrescan-client:
            loggerLevel: full
            connectTimeout: 5000
            readTimeout: 5000

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

email:
  from: ${EMAIL_FROM:noreply@manhwareader.com}
  from-name: ${EMAIL_FROM_NAME:Manhwa Reader}
  admin-email: ${EMAIL_ADMIN:admin@manhwareader.com}
  enabled: ${EMAIL_ENABLED:true}
  

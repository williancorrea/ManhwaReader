synchronization:
  mediocrescan: 
    api:
      url: "https://api.mediocrescan.com"
      username: ${MEDIOCRESCAN_API_USERNAME:admin}
      password: ${MEDIOCRESCAN_API_PASSWORD:admin}
    cdn:
      url: "https://cdn.mediocrescan.com"
  mangotoons:
    api:
      url: "https://mangotoons.com"
    cdn:
      url: "https://cdn.mangotoons.com"
  mangadex:
    api:
      url: "https://api.mangadex.org"
    site:
      url: "https://mangadex.org"
      
#Actuator
management:
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "health,info"

info:
  app:
    name: @project.name@
    version: @project.version@
    encoding: @project.build.sourceEncoding@
    java:
      vendor: @java.vendor@
      version: @java.version@

minio:
  bucket:
    name: ${MINIO_DEFAULT_BUCKETS:manhwa}
  access:
    key: ${MINIO_ACCESS_KEY:admin}
    secret: ${MINIO_SECRET_KEY:admin123}
  url: ${MINIO_URL:http://localhost:9000}



logging:
  level:
    dev.williancorrea.manhwa: INFO
    feign.client.config.default.loggerLevel: debug
    root: INFO
    org.springframework.web: INFO
    org.hibernate: INFO
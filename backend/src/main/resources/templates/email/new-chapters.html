<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novos Cap&iacute;tulos Dispon&iacute;veis</title>
    <style>
        body {
            margin: 0;
            padding: 16px 10px;
            background-color: #edf2f7;
            color: #1f2937;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            line-height: 1.5;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #dbe3ee;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        }
        .header {
            padding: 24px 28px;
            background: linear-gradient(135deg, #0f766e 0%, #0ea5a4 100%);
            color: #ffffff;
        }
        .header .eyebrow {
            display: inline-block;
            margin-bottom: 8px;
            padding: 2px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.25;
        }
        .content {
            padding: 24px 28px;
        }
        .intro {
            margin: 0 0 16px;
            font-size: 14px;
            color: #334155;
        }
        .work-panel {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 14px;
        }
        .work-title {
            margin: 0;
            font-size: 20px;
            line-height: 1.3;
            color: #0f172a;
        }
        .cover-container {
            margin: 12px 0 0;
            text-align: center;
        }
        .cover-image {
            width: 100%;
            max-width: 180px;
            height: auto;
            border-radius: 10px;
            border: 1px solid #dbe3ee;
        }
        .meta {
            margin-top: 8px;
            font-size: 13px;
            color: #475569;
        }
        .count-badge {
            display: inline-block;
            margin-top: 10px;
            margin-left: 15px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #ffffff;
            background-color: #0f766e;
        }
        .chapters-card {
            border: 1px solid #dbe3ee;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 12px;
        }
        .chapters-head {
            padding: 10px 12px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.45px;
            color: #475569;
        }
        .chapter-item {
            padding: 4px 12px;
            border-top: 1px solid #edf2f7;
        }
        .chapter-item:first-child {
            border-top: none;
        }
        .chapter-head {
            display: table;
            width: 100%;
            table-layout: fixed;
        }
        .chapter-title-wrap {
            display: table-cell;
            vertical-align: top;
            padding-right: 8px;
        }
        .chapter-title {
            margin: 0;
            max-width: 230px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.35;
            color: #111827;
            word-break: break-word;
        }
        .chapter-badge-wrap {
            display: table-cell;
            width: 100px;
            max-width: 100px;
            text-align: right;
            vertical-align: top;
            white-space: nowrap;
        }
        .chapter-date {
            margin-top: 4px;
            font-size: 11px;
            color: #64748b;
            max-width: 230px;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.35px;
            text-transform: uppercase;
            color: #ffffff;
            background-color: #64748b;
        }
        .badge-new {
            background-color: #16a34a;
        }
        .badge-updated {
            background-color: #ea580c;
        }
        .badge-error {
            background-color: #dc2626;
        }
        .footer {
            border-top: 1px solid #e2e8f0;
            background-color: #f8fafc;
            padding: 16px 28px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }
        .footer p {
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="eyebrow">Atualiza&ccedil;&atilde;o</span>
            <h1>Novos cap&iacute;tulos dispon&iacute;veis</h1>
        </div>

        <div class="content">
            <p class="intro">Encontramos atualiza&ccedil;&otilde;es para uma obra da sua biblioteca.</p>

            <div class="work-panel">
                <h2 class="work-title" th:text="${workTitle}">T&iacute;tulo da Obra</h2>

                <div class="meta" th:if="${scanlator}">
                    <strong>Scanlator:</strong>
                    <span th:text="${scanlator}">Nome do Scanlator</span>
                </div>
                
                <div class="cover-container" th:if="${coverUrl}">
                    <img th:src="${coverUrl}" alt="Capa da Obra" class="cover-image" />
                </div>
            </div>

            <div class="chapters-card">
                <div class="chapters-head">Cap&iacute;tulos
                    <div class="count-badge" th:text="${chapterCount} + ' novo' + (${chapterCount} > 1 ? 's' : '')">1 novo</div>
                </div>
                
                <div class="chapter-item" th:each="chapter : ${chapters}">
                    <div class="chapter-head">
                        <div class="chapter-title-wrap">
                            <p class="chapter-title" th:text="${chapter.title}">Cap&iacute;tulo 1</p>
                        </div>
                        <div class="chapter-date" th:if="${chapter.publishedAt}" th:text="'Publicado em: ' + ${chapter.publishedAt}">Publicado em: Data</div>
                        <div class="chapter-badge-wrap">
                            <span class="badge"
                                  th:classappend="${chapter.notificationType == 'NEW'} ? ' badge-new' : (${chapter.notificationType == 'UPDATED'} ? ' badge-updated' : ' badge-error')"
                                  th:text="${chapter.notificationType == 'NEW'} ? 'Novo' : (${chapter.notificationType == 'UPDATED'} ? 'Atualizado' : 'Erro')">
                                Novo
                            </span>
                        </div>
                    </div>                    
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Este &eacute; um e-mail autom&aacute;tico do Manhwa Reader.</p>
            <p>&copy; 2026 Manhwa Reader. Todos os direitos reservados.</p>
        </div>
    </div>
</body>
</html>

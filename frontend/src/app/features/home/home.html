<div class="home">
  <app-navbar />

  <!-- Featured Carousel -->
  @if (featuredWorks().length > 0) {
    <app-featured-carousel [items]="featuredWorks()" />
  }

  <!-- Continue Reading -->
  <section class="section">
    <div class="section__inner">
      <div class="section__header">
        <h2 class="section__title">Continue Reading</h2>
        <button class="section__see-all">See All</button>
      </div>
      <div class="scroll-row">
        @for (manhwa of continueReading; track manhwa.id) {
          <app-manhwa-card [manhwa]="manhwa" variant="horizontal" />
        }
      </div>
    </div>
  </section>

  <!-- Latest Updates -->
  <section class="section section--alt">
    <div class="section__inner">
      <div class="section__header">
        <h2 class="section__title">Latest Updates</h2>
        <a routerLink="/catalog" class="section__see-all">See All</a>
      </div>
      <div class="grid-cards">
        @for (manhwa of latestUpdates(); track manhwa.id) {
          <app-manhwa-card [manhwa]="manhwa" variant="grid" />
        }
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer__text">© 2026 ManhwaReader. All rights reserved.</p>
  </footer>
</div>

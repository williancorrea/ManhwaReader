<div class="library">
  <app-navbar />

  <section class="section">
    <div class="section__inner">
      <div class="section__header">
        <h2 class="section__title">Biblioteca</h2>
      </div>

      <div class="library__status-tabs">
        @for (tab of statusTabs; track tab.value) {
          <button
            class="library__status-tab"
            [class.library__status-tab--active]="filterStatus === tab.value"
            (click)="onStatusChange(tab.value)"
            type="button"
          >
            {{ tab.label }}
          </button>
        }
      </div>

      @if (isLoading() && items().length === 0) {
        <div class="library__loading">
          <div class="library__spinner"></div>
        </div>
      } @else if (items().length === 0) {
        <p class="library__empty">Nenhuma obra na biblioteca.</p>
      } @else {
        <div class="grid-cards">
          @for (manhwa of items(); track manhwa.id) {
            <app-manhwa-card [manhwa]="manhwa" variant="grid" />
          }
        </div>
      }

      @if (isLoading() && items().length > 0) {
        <div class="library__loading-more">
          <div class="library__spinner"></div>
        </div>
      }

      <div #sentinel class="library__sentinel"></div>
    </div>
  </section>

  @if (showScrollTop()) {
    <button class="library__scroll-top" type="button" (click)="scrollToTop()" aria-label="Voltar ao topo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </button>
  }
</div>

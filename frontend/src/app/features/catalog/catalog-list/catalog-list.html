<div class="catalog">
  <app-navbar />

  <section class="section">
    <div class="section__inner">
      <div class="section__header">
        <h2 class="section__title">Catálogo</h2>
      </div>

      <div class="catalog__filterbar">
        <div class="catalog__filterbar-search">
          <svg class="catalog__filterbar-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            class="catalog__filterbar-input"
            type="text"
            placeholder="Buscar por título..."
            [ngModel]="filterTitle"
            (ngModelChange)="onTitleChange($event)"
            name="filterTitle"
          />
        </div>

        <div class="catalog__filterbar-actions">
          <button
            class="catalog__toggle-btn"
            [class.catalog__toggle-btn--active]="showFilters || hasActiveFilters"
            type="button"
            (click)="toggleFilters()"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="4" y1="6" x2="20" y2="6"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
              <line x1="11" y1="18" x2="13" y2="18"/>
            </svg>
            {{ (showFilters || hasActiveFilters) ? 'Limpar filtros' : 'Filtros' }}
          </button>

        </div>
      </div>

      @if (showFilters) {
        <div class="catalog__filters-panel">
          <select class="catalog__filter-select" [(ngModel)]="filterType" (ngModelChange)="aplicarFiltros()" name="filterType">
            <option value="">Tipo</option>
            @for (type of workTypes; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>

          <select class="catalog__filter-select" [(ngModel)]="filterDemographic" (ngModelChange)="aplicarFiltros()" name="filterDemographic">
            <option value="">Demografia</option>
            @for (demo of workDemographics; track demo) {
              <option [value]="demo">{{ demo }}</option>
            }
          </select>

          <select class="catalog__filter-select" [(ngModel)]="filterStatus" (ngModelChange)="aplicarFiltros()" name="filterStatus">
            <option value="">Status</option>
            @for (status of workStatuses; track status) {
              <option [value]="status">{{ status }}</option>
            }
          </select>

          <select class="catalog__filter-select" [(ngModel)]="filterSort" (ngModelChange)="aplicarFiltros()" name="filterSort">
            @for (opt of sortOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>
      }

      @if (isLoading() && items().length === 0) {
        <div class="catalog__loading">
          <div class="catalog__spinner"></div>
        </div>
      } @else if (items().length === 0) {
        <p class="catalog__empty">Nenhuma obra encontrada.</p>
      } @else {
        <div class="grid-cards">
          @for (manhwa of items(); track manhwa.id) {
            <app-manhwa-card [manhwa]="manhwa" variant="grid" />
          }
        </div>
      }

      @if (isLoading() && items().length > 0) {
        <div class="catalog__loading-more">
          <div class="catalog__spinner"></div>
        </div>
      }

      <div #sentinel class="catalog__sentinel"></div>
    </div>
  </section>

  @if (showScrollTop()) {
    <button class="catalog__scroll-top" type="button" (click)="scrollToTop()" aria-label="Voltar ao topo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </button>
  }
</div>

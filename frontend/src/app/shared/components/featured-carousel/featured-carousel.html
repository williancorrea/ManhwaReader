<section class="carousel">

  <!-- Header: title + demographic filter tabs -->
  <div class="carousel__header">
    <div class="carousel__heading">
      <svg class="carousel__heading-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="2" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        <line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/>
      </svg>
      <h2 class="carousel__title">Explorar catálogo</h2>
    </div>

    @if (demographics.length > 0) {
      <div class="carousel__demographics">
        @for (demo of demographics; track demo.value) {
          <button
            class="carousel__demo-btn"
            [class.carousel__demo-btn--active]="demo.value === selectedDemographic"
            (click)="selectDemographic(demo.value)"
            type="button"
          >{{ demo.label }}</button>
        }
      </div>
    }
  </div>

  <!-- Filmstrip stage -->
  @if (hasItems()) {
    <div class="carousel__stage">
      @for (item of displayItems(); track item.trackKey) {
        <div
          class="carousel__card carousel__card--{{ positionClass(item.position) }}"
          [style.--slot]="item.position"
          (click)="item.position !== 0 && focusItem(item.sourceIndex)"
        >
          @if (item.position === 0) {
            <a
              class="carousel__card-inner"
              [routerLink]="item.manhwa.slug ? ['/work', item.manhwa.slug] : null"
            >
              <img
                class="carousel__card-image"
                [src]="item.manhwa.coverUrl"
                [alt]="item.manhwa.title"
                loading="eager"
              />
              <div class="carousel__card-overlay"></div>
              <div class="carousel__card-info">
                <span class="carousel__card-title">{{ item.manhwa.title }}</span>
              </div>
            </a>
          } @else {
            <div class="carousel__card-inner">
              <img
                class="carousel__card-image"
                [src]="item.manhwa.coverUrl"
                [alt]="item.manhwa.title"
                loading="lazy"
              />
              <div class="carousel__card-overlay"></div>
              <div class="carousel__card-info">
                <span class="carousel__card-title">{{ item.manhwa.title }}</span>
              </div>
            </div>
          }
        </div>
      }
    </div>
  }

</section>

<nav class="navbar">
  <div class="navbar__inner">
    <a routerLink="/home" class="navbar__logo">
      <span class="navbar__logo-icon">M</span>
      <span class="navbar__logo-text">ManhwaReader</span>
    </a>

    <nav class="navbar__nav">
      <a routerLink="/catalog" class="navbar__nav-link" routerLinkActive="navbar__nav-link--active">Catálogo</a>
      <a routerLink="/library" class="navbar__nav-link" routerLinkActive="navbar__nav-link--active">Biblioteca</a>
    </nav>

    <!-- User menu -->
    <div class="navbar__user-menu">
      <button
        class="navbar__avatar"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-label="User menu"
      >
        @if (userService.profile()?.avatarUrl) {
          <img
            class="navbar__avatar-img"
            [src]="userService.profile()!.avatarUrl!"
            [alt]="userService.profile()!.name"
            referrerpolicy="no-referrer"
          />
        } @else {
          <span>{{ userService.initials() }}</span>
        }
      </button>

      @if (isMenuOpen()) {
        <div class="navbar__dropdown" role="menu">
          <div class="navbar__dropdown-header">
            <div class="navbar__dropdown-avatar">
              @if (userService.profile()?.avatarUrl) {
                <img
                  class="navbar__avatar-img"
                  [src]="userService.profile()!.avatarUrl!"
                  [alt]="userService.profile()!.name"
                />
              } @else {
                <span>{{ userService.initials() }}</span>
              }
            </div>
            <div class="navbar__dropdown-info">
              <span class="navbar__dropdown-name">{{ userService.profile()?.name ?? '—' }}</span>
              <span class="navbar__dropdown-email">{{ userService.profile()?.email ?? '—' }}</span>
            </div>
          </div>

          @if (isAdmin()) {
            <div class="navbar__dropdown-divider"></div>
            <a routerLink="/admin" class="navbar__dropdown-item" role="menuitem" (click)="isMenuOpen.set(false)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              Administração
            </a>
          }

          <div class="navbar__dropdown-divider"></div>

          <button class="navbar__dropdown-item navbar__dropdown-item--danger" (click)="logout()" role="menuitem">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair
          </button>
        </div>
      }
    </div>
  </div>
</nav>
